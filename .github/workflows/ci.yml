name: CI - Validacao Portabilidade PRO

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: frontend

    env:
      BACKEND_URL: https://api.portabilidadepro.com.br
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Executar build do frontend
        run: npm run build

  backend-syntax:
    name: Backend Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verificar sintaxe do backend
        run: python -m compileall -q backend/app
